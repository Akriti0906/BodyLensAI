<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Camera - BodyLens AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="cam-page">

<div class="cam-fullscreen">

    <video id="cam-video" playsinline></video>
    <canvas id="cam-canvas"></canvas>

    <div class="cam-topbar">
        <div class="cam-title">
            <i data-lucide="scan-line"></i>
            <span>Squat Analyzer</span>
        </div>
        <a href="index.html" class="cam-exit" aria-label="Exit">
            <i data-lucide="x"></i>
        </a>
    </div>

    <div class="cam-stats">
        <div class="cam-stat"><span class="cam-stat-label">Reps</span><span id="cam-reps" class="cam-stat-num">0</span></div>
        <div class="cam-stat"><span class="cam-stat-label">Stage</span><span id="cam-stage" class="cam-stat-val">—</span></div>
        <div class="cam-stat"><span class="cam-stat-label">Knee</span><span id="cam-angle" class="cam-stat-val">—</span></div>
    </div>

    <div id="cam-feedback" class="cam-feedback">Press Start to begin</div>

    <div class="cam-controls">
        <button id="cam-start" type="button" class="cam-btn cam-btn-primary">
            <i data-lucide="play"></i><span>Start</span>
        </button>
        <button id="cam-stop" type="button" class="cam-btn" style="display:none;">
            <i data-lucide="square"></i><span>Stop</span>
        </button>
        <button id="cam-switch" type="button" class="cam-btn">
            <i data-lucide="switch-camera"></i><span>Flip</span>
        </button>
        <button id="cam-reset" type="button" class="cam-btn">
            <i data-lucide="rotate-ccw"></i><span>Reset</span>
        </button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="js/camera.js"></script>
<script>if (window.lucide) lucide.createIcons();</script>

</body>
</html>
